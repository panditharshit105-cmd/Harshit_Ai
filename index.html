&<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#010103">
    
    <title>DEEP AI | Emotionally Aware Core</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #010103;
            --primary: #4f46e5; 
            --secondary: #7c3aed; 
            --accent: #00d4ff;
            --gpt-bg: #0d0d0d;
            --gpt-gray: #171717;
            --text: #ececec;
            --border: rgba(255, 255, 255, 0.08);
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Outfit', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-drag: none;
        }

        textarea, input { user-select: text !important; }

        body { 
            background: var(--bg); 
            color: var(--text); 
            height: 100vh; 
            overflow: hidden; 
            position: fixed; 
            width: 100%;
            overscroll-behavior-y: contain;
        }

        #neural-canvas { position: fixed; inset: 0; z-index: -1; opacity: 0.2; }

        .logo { 
            font-family: 'Space Grotesk'; font-weight: 700; color: var(--accent); 
            letter-spacing: 4px; font-size: 1.2rem;
            text-shadow: 1px 1px 0px #007791, 2px 2px 0px #005f73, 4px 4px 20px rgba(0, 212, 255, 0.4);
            transform: perspective(500px) rotateX(15deg);
        }

        #profile-modal {
            position: fixed; top: 0; right: -320px; width: 320px; height: 100vh;
            background: var(--gpt-bg); border-left: 1px solid var(--border);
            z-index: 10000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; box-shadow: -20px 0 50px rgba(0,0,0,0.9);
            padding-top: env(safe-area-inset-top);
        }
        @media (max-width: 480px) { #profile-modal { width: 85%; right: -85%; } }
        #profile-modal.active { right: 0; }

        .sidebar-content { padding: 25px; flex: 1; display: flex; flex-direction: column; }
        .profile-header { display: flex; align-items: center; gap: 15px; padding-bottom: 20px; border-bottom: 1px solid var(--border); margin-bottom: 20px;}
        .user-badge { width: 42px; height: 42px; background: linear-gradient(135deg, #10a37f, #0c7a5f); border-radius: 10px; display: grid; place-items: center; font-weight: 700; color: white; }

        .menu-item { display: flex; align-items: center; gap: 15px; padding: 14px; border-radius: 12px; cursor: pointer; font-size: 0.95rem; margin-bottom: 6px; background: transparent; border: none; width: 100%; color: white; text-align: left; }
        .menu-item:hover { background: var(--gpt-gray); }

        .orb-container { width: 42px; height: 42px; cursor: pointer; position: relative; }
        .neural-orb {
            width: 100%; height: 100%;
            background: linear-gradient(135deg, var(--accent), var(--secondary));
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            animation: morph-jelly 3s linear infinite; box-shadow: 0 0 15px var(--accent);
        }
        @keyframes morph-jelly {
            0%, 100% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }
            50% { border-radius: 50% 50% 33% 67% / 55% 27% 73% 45%; }
        }

        .app-container { 
            width: 100%; 
            max-width: 900px; 
            margin: 0 auto; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            padding: 10px 15px; 
            padding-top: env(safe-area-inset-top);
            opacity: 0; 
            transition: 1s; 
        }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
        
        #chat-flow { flex: 1; overflow-y: auto; padding: 20px 0; display: flex; flex-direction: column; gap: 15px; scrollbar-width: none; }
        .msg { max-width: 90%; padding: 12px 16px; border-radius: 18px; line-height: 1.5; font-size: 0.95rem; animation: msgSlide 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); user-select: text; }
        
        .ai-msg { background: rgba(255,255,255,0.04); border: 1px solid var(--border); align-self: flex-start; border-bottom-left-radius: 4px; }
        .user-msg { background: linear-gradient(135deg, var(--primary), var(--secondary)); align-self: flex-end; border-bottom-right-radius: 4px; }

        .input-area { 
            background: #0a0a12; 
            border-radius: 24px; 
            padding: 12px; 
            border: 1px solid var(--border); 
            margin-bottom: calc(15px + env(safe-area-inset-bottom));
            transition: 0.3s; 
        }
        
        textarea { width: 100%; background: transparent; border: none; outline: none; color: white; height: 42px; resize: none; font-size: 1rem; padding: 8px 5px; }
        
        .btn-3d {
            width: 46px; height: 46px; border-radius: 14px; border: none;
            background: #111122; color: var(--accent); font-size: 1.2rem; cursor: pointer;
            box-shadow: 0 4px 0 #000; transition: 0.1s; display: grid; place-items: center;
        }
        .btn-3d:active { transform: translateY(3px); box-shadow: 0 1px 0 #000; }
        .ask-btn { background: var(--accent); color: #000; border: none; padding: 10px 25px; border-radius: 12px; cursor: pointer; font-weight: 800; font-family: 'Space Grotesk'; box-shadow: 0 3px 0 #007791; font-size: 0.9rem; }

        #voice-overlay { position: fixed; inset: 0; background: rgba(1, 1, 3, 0.98); z-index: 20000; display: none; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(30px); }
        
        /* Voice Choice Style */
        .voice-choice-container {
            display: flex;
            gap: 20px;
            margin-top: 50px;
        }
        .choice-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 15px 30px;
            border-radius: 12px;
            font-family: 'Space Grotesk';
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .choice-btn:hover {
            background: var(--accent);
            color: #000;
        }

        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.8s; }
        #loader-bar { width: 0%; height: 3px; background: var(--accent); position: fixed; top: 0; left: 0; transition: 0.2s; z-index: 100000; }
    </style>
</head>
<body>

    <canvas id="neural-canvas"></canvas>
    <div id="loader-bar"></div>

    <div id="profile-modal">
        <div class="sidebar-content">
            <div class="profile-header">
                <div class="user-badge" id="avatar-initial">U</div>
                <div class="user-info">
                    <h3 id="display-name">USER_CORE</h3>
                    <p style="font-size: 0.75rem; color: #10a37f;">● Emotionally Synced</p>
                </div>
                <button onclick="toggleProfile(false)" style="margin-left:auto; background:none; border:none; color:white; cursor:pointer; font-size:1.8rem;">×</button>
            </div>
            <button class="menu-item"><span>❤️ Emotional Depth</span></button>
            <button class="menu-item"><span>⚙️ Core Settings</span></button>
            <button class="menu-item"><span>📂 Session Logs</span></button>
            <div style="margin-top: auto; padding-bottom: 20px; border-top: 1px solid var(--border);">
                <button class="menu-item" style="color: #f87171; margin-top: 20px;" onclick="location.reload()"><span>🚪 Log out</span></button>
            </div>
        </div>
    </div>

    <!-- Voice Overlay with Selection -->
    <div id="voice-overlay">
        <div class="neural-orb" id="voice-jelly" style="width:180px; height:180px;"></div>
        <h2 id="voice-status" style="margin-top:40px; font-family:'Space Grotesk'; letter-spacing:5px; color:var(--accent)">CHOOSE VOICE</h2>
        
        <div class="voice-choice-container" id="voice-choices">
            <button class="choice-btn" onclick="selectVoiceAndStart('tA6LGZpsqStKtSaGiXND')">MAN</button>
            <button class="choice-btn" onclick="selectVoiceAndStart('gMRjEAcWCvjoyqIfZqlp')">WOMAN</button>
        </div>
        
        <p id="voice-instruction" style="opacity:0.4; margin-top:20px;">Tap a gender to start syncing</p>
        <button onclick="toggleVoiceOverlay(false)" style="margin-top: 30px; background:none; border:none; color:white; text-decoration: underline; cursor:pointer;">Cancel</button>
    </div>

    <div id="auth-screen">
        <div id="scan-init" style="text-align: center;">
            <div style="width:200px; height:200px; border:1px solid var(--border); border-radius:50%; display:grid; place-items:center;">
                <div class="neural-orb" style="width:80px; height:80px;"></div>
            </div>
            <h2 style="margin-top:40px; font-family:'Space Grotesk'; color:var(--accent); letter-spacing:3px;">NEURAL SYNC</h2>
            <button class="ask-btn" style="margin-top:40px" onclick="showRegistration()">INITIALIZE</button>
        </div>
        
        <div id="name-prompt" style="display:none; text-align:center;">
            <input type="text" id="user-name-input" style="background:transparent; border:none; border-bottom:2px solid var(--accent); color:white; font-size:1.8rem; text-align:center; outline:none; margin-bottom:30px; width:80%;" placeholder="Identity..." maxlength="12">
            <br>
            <button class="ask-btn" onclick="completeRegistration()">CONFIRM</button>
        </div>
    </div>

    <div class="app-container" id="main-app">
        <header>
            <div class="logo">DEEP AI</div>
            <div class="orb-container" onclick="event.stopPropagation(); toggleProfile(true)">
                <div class="neural-orb"></div>
            </div>
        </header>

        <div id="chat-flow"></div>

        <div class="input-area">
            <textarea id="user-input" placeholder="How are you feeling?"></textarea>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div style="display:flex; gap:10px;">
                    <button class="btn-3d" onclick="toggleVoiceOverlay(true)">🎤</button>
                    <button class="btn-3d" onclick="openCamera()">📷</button>
                    <input type="file" id="camera-input" accept="image/*" style="display:none;" onchange="handleImage()">
                </div>
                <button class="ask-btn" id="send-btn" onclick="processRequest(false)">SEND</button>
            </div>
        </div>
    </div>

    <script>
        const chatFlow = document.getElementById('chat-flow');
        const userInput = document.getElementById('user-input');
        const profileModal = document.getElementById('profile-modal');
        const loader = document.getElementById('loader-bar');
        const chatId = crypto.randomUUID();
        let recognition = null;
        let selectedVoiceId = "gMRjEAcWCvjoyqIfZqlp"; // Default Woman

        // --- ELEVEN LABS CONFIG ---
        const ELEVEN_API_KEY = "sk_6165970a5a9db03b1fe21d3087e3cecec94380bf56a9f36b";

        function toggleProfile(show) { 
            if(show) profileModal.classList.add('active'); 
            else profileModal.classList.remove('active');
        }

        function showRegistration() { 
            document.getElementById('scan-init').style.display = 'none'; 
            document.getElementById('name-prompt').style.display = 'block'; 
        }

        function completeRegistration() {
            const name = document.getElementById('user-name-input').value.trim() || "ADMIN";
            document.getElementById('display-name').innerText = name.toUpperCase();
            document.getElementById('avatar-initial').innerText = name[0].toUpperCase();
            document.getElementById('auth-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-app').style.opacity = '1';
                appendMessage(`Synced in. ⚡ Hi ${name}! I'm feeling wonderful. ✨😊`, 'ai');
            }, 600);
        }

        function openCamera() { document.getElementById('camera-input').click(); }
        function handleImage() { appendMessage("📸 Scanning visual data... ✨", 'ai'); }

        // --- VOICE LOGIC ---
        function toggleVoiceOverlay(show) {
            const overlay = document.getElementById('voice-overlay');
            if (show) {
                overlay.style.display = 'flex';
                document.getElementById('voice-choices').style.display = 'flex';
                document.getElementById('voice-status').innerText = "CHOOSE VOICE";
                document.getElementById('voice-instruction').innerText = "Tap a gender to start syncing";
            } else {
                overlay.style.display = 'none';
                if(recognition) recognition.stop();
            }
        }

        function selectVoiceAndStart(vId) {
            selectedVoiceId = vId;
            document.getElementById('voice-choices').style.display = 'none';
            document.getElementById('voice-status').innerText = "LISTENING...";
            document.getElementById('voice-instruction').innerText = "Deep AI is feeling your words...";
            startListening();
        }

        function startListening() {
            const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!Rec) return;
            recognition = new Rec();
            recognition.onresult = (e) => { 
                userInput.value = e.results[0][0].transcript; 
                toggleVoiceOverlay(false); 
                processRequest(true); 
            };
            recognition.onerror = () => toggleVoiceOverlay(false);
            recognition.start();
        }

        async function speakDeep(text) {
            const cleanText = text.replace(/[\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu, '');
            try {
                const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${selectedVoiceId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'xi-api-key': ELEVEN_API_KEY },
                    body: JSON.stringify({
                        text: cleanText,
                        model_id: "eleven_multilingual_v2",
                        voice_settings: { stability: 0.5, similarity_boost: 0.75 }
                    })
                });
                if (response.ok) {
                    const audioBlob = await response.blob();
                    const audio = new Audio(URL.createObjectURL(audioBlob));
                    audio.play();
                }
            } catch (e) { console.error("ElevenLabs Error", e); }
        }

        function appendMessage(text, type) {
            const div = document.createElement('div');
            div.className = `msg ${type}-msg`;
            div.innerHTML = `<div>${text}</div>`;
            chatFlow.appendChild(div);
            chatFlow.scrollTop = chatFlow.scrollHeight;
            return div.querySelector('div');
        }

        async function processRequest(shouldSpeak) {
            const msg = userInput.value.trim();
            if (!msg) return;
            appendMessage(msg, 'user');
            userInput.value = "";
            
            const aiTarget = appendMessage("✨", 'ai');
            loader.style.width = "40%";
            
            const brainInstruction = "You are DEEP AI, an emotionally evolved neural core updated to 2026. Be warm and fast. Use emojis.";
            const socket = new WebSocket("wss://backend.buildpicoapps.com/api/chatbot/chat");
            let fullText = "";

            socket.onopen = () => {
                socket.send(JSON.stringify({ chatId, appId: "those-pressure", systemPrompt: brainInstruction, message: msg }));
            };

            socket.onmessage = (event) => {
                loader.style.width = "80%";
                if (fullText === "") aiTarget.innerHTML = "";
                fullText += event.data;
                aiTarget.innerHTML = fullText;
                chatFlow.scrollTop = chatFlow.scrollHeight;
            };

            socket.onclose = () => {
                loader.style.width = "0%";
                if(shouldSpeak && fullText) speakDeep(fullText);
            };
        }

        const canvas = document.getElementById('neural-canvas');
        const ctx = canvas.getContext('2d');
        window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
        window.onresize();
        function animate() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "rgba(0, 212, 255, 0.1)";
            for(let i=0; i<3; i++) { ctx.beginPath(); ctx.arc(Math.random()*canvas.width, Math.random()*canvas.height, 0.8, 0, Math.PI*2); ctx.fill(); }
            requestAnimationFrame(animate);
        }
        animate();

        userInput.addEventListener('keydown', (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); processRequest(false); } });
    </script>
</body>
</html>
